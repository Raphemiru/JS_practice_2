<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <!-- TO-DO LIST TITLE -->
      <header class="to-do-title">
        <h1>To-Do List <img src="images/icon.png" /></h1>
      </header>
      <!-- ADD-TASK FIELD & BUTTON -->
      <form>
        <input
          type="text"
          class="add-task"
          placeholder="Add your task"
          aria-label="Add task"
        />
        <button type="submit">Add</button>
      </form>
      <!-- TASKS -->
      <section aria-label="Current Tasks">
        <ul class="task-list">
          <li>
            <img src="" alt="" />
            <span>task</span>
            <button class="remove-task">x</button>
          </li>
        </ul>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
