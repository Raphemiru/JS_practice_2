<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- BACKGROUND -->
    <div class="midnight-sky" aria-hidden="true">
      <div class="sky-canvas"></div>
      <div class="stars stars-1"></div>
      <div class="stars stars-2"></div>
      <div class="stars stars-3"></div>
      <div class="meteor m1"></div>
      <div class="meteor m2"></div>
      <div class="meteor m3"></div>
      <div class="moon"></div>
    </div>
    <main>
      <!-- TO-DO LIST TITLE -->
      <header class="to-do-title">
        <h1>To-Do List <img class="icon" src="images/icon.png" /></h1>
      </header>
      <!-- ADD-TASK FIELD & BUTTON -->
      <form>
        <input
          type="text"
          class="add-task-input"
          id="add-task-input"
          placeholder="Add your task"
          aria-label="Add task"
        />
        <button type="button" class="add-task-button" id="add-task-button">
          Add
        </button>
      </form>
      <!-- TASKS -->
      <section class="current-tasks" aria-label="Current Tasks">
        <ul class="task-list" id="task-list"></ul>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
